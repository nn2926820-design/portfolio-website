<!DOCTYPE html>
<html><head><title>Task 26 - Validation</title>
<style>body{background:#0f172a;font-family:Arial;display:flex;justify-content:center;padding:50px}form{background:#1e293b;padding:30px;border-radius:10px;width:350px}input{width:100%;padding:12px;margin:10px 0;background:#0f172a;border:1px solid #334155;color:white;border-radius:6px;box-sizing:border-box}.error{color:#ef4444;font-size:12px}button{background:#38bdf8;width:100%;padding:12px;border:none;border-radius:6px;font-weight:bold}</style>
</head><body>
<form onsubmit="return validate()">
<h2 style="color:#38bdf8;text-align:center">Frontend Validation</h2>
<input type="text" id="name" placeholder="Name">
<div class="error" id="nameErr"></div>
<input type="email" id="email" placeholder="Email">
<div class="error" id="emailErr"></div>
<button>Submit</button>
<p style="color:#94a3b8;text-align:center;margin-top:15px">Task 26 by Naveen S</p>
</form>
<script>
function validate(){
  let valid = true;
  if(document.getElementById('name').value===''){document.getElementById('nameErr').textContent='Name required';valid=false}
  if(document.getElementById('email').value===''){document.getElementById('emailErr').textContent='Email required';valid=false}
  if(valid)alert('Form Valid!');
  return valid;
}
</script></body></html>
