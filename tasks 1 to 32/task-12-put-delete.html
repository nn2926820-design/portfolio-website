<!DOCTYPE html>
<html><head><title>Task 12 - Responsive Forms</title>
<style>body{background:#0f172a;font-family:Arial;padding:20px}form{background:#1e293b;padding:30px;border-radius:10px;max-width:500px;margin:0 auto}input,textarea{width:100%;padding:12px;margin:10px 0;background:#0f172a;border:1px solid #334155;color:white;border-radius:6px;box-sizing:border-box}button{background:#38bdf8;width:100%;padding:14px;border:none;border-radius:6px;font-weight:bold}@media(max-width:600px){form{padding:20px}}</style>
</head><body>
<form>
<h2 style="color:#38bdf8;text-align:center">Responsive Form</h2>
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<textarea rows="4" placeholder="Message"></textarea>
<button>Submit</button>
<p style="color:#94a3b8;text-align:center;margin-top:15px">Task 12 by Naveen S</p>
</form></body></html>
