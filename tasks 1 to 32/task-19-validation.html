<!DOCTYPE html>
<html><head><title>Task 19 - Vue.js</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<style>body{background:#0f172a;color:white;font-family:Arial;padding:40px;text-align:center}button{background:#38bdf8;color:#0f172a;padding:12px 24px;border:none;border-radius:6px;font-weight:bold;cursor:pointer}</style>
</head><body>
<div id="app">
<h1 style="color:#38bdf8">Vue.js Application</h1>
<h2>{{ message }}</h2>
<button @click="reverse">Reverse Message</button>
<p style="color:#94a3b8;margin-top:20px">Task 19 by Naveen S</p>
</div>
<script>
const { createApp } = Vue;
createApp({
  data() { return { message: 'Hello Vue.js!' } },
  methods: { reverse() { this.message = this.message.split('').reverse().join('') } }
}).mount('#app');
</script></body></html>
